# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "7.2.0"
  cowsay_wasm: wasmer-test-files/integration/wasm/cowsay.wasm

package:
  name: wasmer
  version: ${{ version }}

source:
  url: https://github.com/wasmerio/wasmer/releases/download/v${{ version }}/wasmer-full-source.tar.gz
  sha256: 9fa9150fc939b1b1636ed19cfd0b345be09082a8ae1ac6ce96061dec2effb574

build:
  number: 0
  script:
    env:
      DEFAULT_FEATURES: |-
        cranelift,singlepass,wasm-c-api,wasmer-artifact-create,static-artifact-create,wasmer-artifact-load,static-artifact-load
    file: build-wasmer

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - libffi
    - openssl
    - zlib
    - if: linux
      then:
        - libxkbcommon
        - libxml2-devel
        - llvm-tools
        - llvmdev
        - zstd
  run:
    - if: linux
      then:
        - zstd

tests:
  - files:
      recipe:
        - run_test.py
      source:
        - ${{ cowsay_wasm }}
    requirements:
      run:
        - pytest
    script:
      env:
        COWAY_WASM: ${{ cowsay_wasm }}
      content:
        - wasmer --version
        - wasmer --help
        - wasmer run --help
        - python run_test.py

about:
  license: MIT
  summary: Universal WebAssembly runtime
  description: |
    Wasmer is a standalone JIT WebAssembly runtime, aiming to be fully
    compatible with WASI and Emscripten.
  license_file:
    - LICENSE
    - THIRDPARTY.yml
    - docs/ATTRIBUTIONS.md
  homepage: https://wasmer.io
  repository: https://github.com/wasmerio/wasmer
  documentation: https://docs.wasmer.io

extra:
  recipe-maintainers:
    - bollwyvl
    - wolfv
